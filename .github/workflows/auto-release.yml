name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Compute the tag without pushing it"
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  auto-release:
    # The CLI family intentionally follows the centrally maintained rolling v1.
    uses: open-cli-collective/.github/.github/workflows/auto-release.yml@v1
    with:
      dry-run: ${{ github.event_name == 'workflow_dispatch' && (inputs.dry-run == true || inputs.dry-run == 'true') }}
    secrets:
      tag-token: ${{ secrets.TAP_GITHUB_TOKEN }}
