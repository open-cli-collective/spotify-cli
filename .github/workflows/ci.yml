name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Standard shipped tags: include 1Password backends and disable Passage.
env:
  GOFLAGS: -tags=keyring_nopassage

jobs:
  build-platform:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cgo: "0"
          - os: macos-latest
            cgo: "1"
          - os: windows-latest
            cgo: "0"
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: ${{ matrix.cgo }}
    steps:
      - uses: actions/checkout@v4
      - uses: open-cli-collective/.github/actions/go-build@v1
        with:
          go-version-file: go.mod

  build:
    needs: [build-platform]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: echo "::error::a build-platform leg failed or was cancelled" && exit 1

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-cli-collective/.github/actions/go-test@v1
        with:
          go-version-file: go.mod
          target: test-cover
      - name: Test without 1Password support
        run: make test-no1password
      - name: Test static credential path
        run: make test-static-smoke
      - name: Check module tidiness
        run: make tidy

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-cli-collective/.github/actions/go-lint@v1
        with:
          go-version-file: go.mod

  identity-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: open-cli-collective/.github/actions/identity-check@v1

  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: open-cli-collective/.github/actions/pr-title@v1
        with:
          title: ${{ github.event.pull_request.title }}
